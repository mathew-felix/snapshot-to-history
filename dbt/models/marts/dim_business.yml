version: 2

models:
  - name: dim_business
    description: >
      Repaired SCD Type 2 dimension table for NYC business licenses.
      One row per version of a business record, keyed by license_nbr.
      The model rebuilds effective ranges from all staged snapshots, which makes
      backfills and late-arriving records deterministic.
    columns:
      - name: business_sk
        description: "Surrogate key for this version row."
        tests:
          - unique
          - not_null
      - name: license_nbr
        description: "Natural key: business license number."
        tests:
          - not_null
      - name: attr_hash
        description: "MD5 hash of normalized tracked attributes."
        tests:
          - not_null
      - name: valid_from
        description: "Version start date, inclusive."
        tests:
          - not_null
      - name: valid_to
        description: "Version end date, exclusive. NULL means current."
      - name: is_current
        description: "True when this is the open version for the natural key."
        tests:
          - not_null

snapshots:
  - name: businesses_snapshot
    description: "dbt-native snapshot retained for lineage comparison."

