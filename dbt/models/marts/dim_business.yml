version: 2

snapshots:
  - name: businesses_snapshot
    description: >
      SCD Type 2 dimension table for NYC business licenses.
      One row per version of a business record, keyed by license_nbr.
      dbt_valid_to IS NULL indicates the current (active) version.
    columns:
      - name: dbt_scd_id
        description: "Surrogate key for this version row (generated by dbt)"
        tests:
          - unique
          - not_null
      - name: license_nbr
        description: "Natural key — business license number"
        tests:
          - not_null
      - name: attr_hash
        description: "MD5 hash of tracked attributes — change detection key"
        tests:
          - not_null
      - name: dbt_valid_from
        description: "When this version became active (inclusive)"
        tests:
          - not_null
      - name: dbt_valid_to
        description: "When this version was superseded (NULL = currently active)"
